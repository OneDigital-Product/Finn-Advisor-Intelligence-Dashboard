name: MuleSoft API - Dev
values:
  - key: baseUrl
    value: 'https://api-dev.example.com'
    enabled: true
    type: default
    description: 'Base URL for the API under test.'
  - key: orgId
    value: '00000000-0000-0000-0000-000000000000'
    enabled: true
    type: default
    description: 'Anypoint organization ID.'
  - key: envId
    value: '11111111-1111-1111-1111-111111111111'
    enabled: true
    type: default
    description: 'Anypoint environment ID.'
  - key: clientId
    value: ''
    enabled: true
    type: default
    description: 'OAuth client ID for the API instance/contract.'
  - key: clientSecret
    value: ''
    enabled: true
    type: secret
    description: 'OAuth client secret for the API instance/contract.'
  - key: authType
    value: client_credentials
    enabled: true
    type: default
    description: 'Auth grant used to obtain token.'
  - key: tokenUrl
    value: 'https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token'
    enabled: true
    type: default
    description: 'Token endpoint for client credentials.'
  - key: accessToken
    value: ''
    enabled: true
    type: secret
    description: 'Will be populated by pre-request script when token is fetched.'
  - key: resource
    value: ''
    enabled: true
    type: default
    description: 'Optional resource/audience if the token endpoint requires it.'
  - key: apiVersion
    value: v1
    enabled: true
    type: default
    description: 'Version path segment.'
  - key: timeoutMs
    value: '30000'
    enabled: true
    type: default
    description: 'Default request timeout.'
  - key: proxy
    value: ''
    enabled: true
    type: default
    description: 'HTTP proxy URL if needed.'
description: |-
  MuleSoft API development environment for testing Anypoint-hosted and on‑prem APIs.

  Pre-request script template (copy into your environment-level pre-request script if you want to automate token fetching):

  ```javascript
  // Template: Fetch OAuth access token via client_credentials and set Authorization header
  // Requirements:
  // - Set {{clientId}} and {{clientSecret}} in this environment
  // - Ensure {{tokenUrl}} points to your token endpoint
  // - Optional: set {{resource}} if your auth server requires audience/resource
  // - Stores the token in {{accessToken}}

  (function() {
    const tokenUrl = pm.environment.get('tokenUrl');
    const clientId = pm.environment.get('clientId');
    const clientSecret = pm.environment.get('clientSecret');
    const authType = pm.environment.get('authType') || 'client_credentials';
    const resource = pm.environment.get('resource');

    if (!tokenUrl || !clientId || !clientSecret) {
      console.warn('[Token Template] Missing tokenUrl, clientId, or clientSecret — skipping token fetch.');
      return;
    }

    const form = [
      { key: 'grant_type', value: authType },
      { key: 'client_id', value: clientId },
      { key: 'client_secret', value: clientSecret }
    ];

    if (resource) {
      form.push({ key: 'resource', value: resource });
      // Some IdPs require 'audience' instead of 'resource'. Uncomment if needed:
      // form.push({ key: 'audience', value: resource });
    }

    pm.sendRequest({
      url: tokenUrl,
      method: 'POST',
      header: [
        { key: 'Content-Type', value: 'application/x-www-form-urlencoded' }
      ],
      body: {
        mode: 'urlencoded',
        urlencoded: form
      }
    }, function (err, res) {
      if (err) {
        console.error('[Token Template] Token request failed:', err);
        return;
      }

      if (!res) {
        console.error('[Token Template] No response received from token endpoint');
        return;
      }

      if (!res.ok) {
        console.error('[Token Template] Token endpoint error', res.code, res.status, res.text());
        return;
      }

      let json;
      try {
        json = res.json();
      } catch (e) {
        console.error('[Token Template] Failed to parse token response as JSON:', e, res.text());
        return;
      }

      const accessToken = json.access_token || json.token || json.id_token;
      const tokenType = (json.token_type || 'Bearer').trim();

      if (!accessToken) {
        console.error('[Token Template] No access_token found in response:', json);
        return;
      }

      pm.environment.set('accessToken', accessToken);
      // Set Authorization header for the current request
      pm.request.headers.add({ key: 'Authorization', value: tokenType + ' ' + accessToken, description: 'Set by env pre-request script' });

      console.log('[Token Template] Access token set. Expires in (secs):', json.expires_in);
    });
  })();
  ```
